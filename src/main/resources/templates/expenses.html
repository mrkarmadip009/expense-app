<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Expense Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #fafafa; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        label { font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 6px; font-weight: bold; grid-column: span 2; }
        button:hover { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #333; }
        .logout-btn { float: right; background: #6c757d; color: white; text-decoration: none; padding: 8px 15px; border-radius: 6px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <a th:href="@{/logout}" class="logout-btn">Logout</a>
    <h2>Add New Expense</h2>

    <form th:action="@{/add-expense}" th:object="${newExpense}" method="post">
        <div>
            <label>Title</label>
            <input type="text" th:field="*{title}" placeholder="Dinner, Rent, etc." required />
        </div>
        <div>
            <label>Amount</label>
            <input type="number" step="0.01" th:field="*{amount}" required />
        </div>
        <div>
            <label>Category</label>
            <input type="text" th:field="*{category}" placeholder="Food, Bills, etc." required />
        </div>
        <div>
            <label>Date</label>
            <input type="date" th:field="*{date}" required />
        </div>
        <button type="submit">Save Expense</button>
    </form>

    <h2>Your Transaction History</h2>
    <table>
        <thead>
        <tr>
            <th>Date</th>
            <th>Title</th>
            <th>Category</th>
            <th>Amount</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="expense : ${expenses}">
            <td th:text="${expense.date}">Date</td>
            <td th:text="${expense.title}">Title</td>
            <td th:text="${expense.category}">Category</td>
            <td th:text="${'₹' + expense.amount}">Amount</td>
        </tr>
        <tr th:if="${#lists.isEmpty(expenses)}">
            <td colspan="4" style="text-align: center; color: #888;">No expenses found for your account.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
