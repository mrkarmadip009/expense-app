<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Expense & Budget Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2 class="text-center mb-4">Personal Expense Tracker</h2>

    <div class="row">
        <div class="col-md-5">
            <div class="card shadow-sm p-3 mb-3">
                <h5>1. Add New Category</h5>
                <form th:action="@{/addCategory}" method="post" class="d-flex gap-2">
                    <input type="text" name="categoryName" class="form-control" placeholder="e.g. Health" required>
                    <button type="submit" class="btn btn-dark">Add</button>
                </form>
            </div>

            <div class="card shadow-sm p-3 mb-3">
                <h5>2. Set Monthly Budget</h5>
                <form th:action="@{/saveBudget}" method="post">
                    <input type="number" name="amountLimit" class="form-control mb-2" placeholder="Limit (₹)" required>
                    <select name="categoryId" class="form-select mb-2" required>
                        <option value="">Select Category</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                    <input type="month" name="month" class="form-control mb-2" required>
                    <button type="submit" class="btn btn-success w-100">Save Budget</button>
                </form>
            </div>

            <div class="card shadow-sm p-3 mb-3">
                <h5>3. Add Expense</h5>
                <form th:action="@{/saveExpense}" th:object="${expense}" method="post">
                    <input type="text" th:field="*{title}" class="form-control mb-2" placeholder="What for?" required>
                    <input type="number" step="0.01" th:field="*{amount}" class="form-control mb-2" placeholder="Amount" required>
                    <select name="categoryId" class="form-select mb-2" required>
                        <option value="">Select Category</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                    <input type="date" th:field="*{date}" class="form-control mb-2" required>
                    <button type="submit" class="btn btn-primary w-100">Save Expense</button>
                </form>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm p-3 mb-3">
                <h5>Budgets Set</h5>
                <table class="table table-sm">
                    <thead><tr><th>Month</th><th>Category</th><th>Limit</th></tr></thead>
                    <tbody>
                    <tr th:each="b : ${budgets}">
                        <td th:text="${b.month}"></td>
                        <td th:text="${b.category.name}"></td>
                        <td th:text="'₹' + ${b.amountLimit}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="card shadow-sm p-3">
                <h5>Transaction History</h5>
                <table class="table table-hover table-sm">
                    <thead class="table-light"><tr><th>Date</th><th>Title</th><th>Category</th><th>Amount</th></tr></thead>
                    <tbody>
                    <tr th:each="exp : ${expenses}">
                        <td th:text="${exp.date}"></td>
                        <td th:text="${exp.title}"></td>
                        <td th:text="${exp.category != null ? exp.category.name : 'N/A'}"></td>
                        <td th:text="'₹' + ${exp.amount}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
